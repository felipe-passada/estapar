version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: estapar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: estapar_db
      MYSQL_USER: estapar
      MYSQL_PASSWORD: estapar_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
    name: estapar_mysql_data
